<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Verifier | Omni</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    .input-box { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--color-primary); color: #fff; border-radius: 8px; font-size: 1.1rem; margin-top: 15px; margin-bottom: 20px;}
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <main class="container" style="min-height: 80vh; max-width:600px; padding: 80px 0; text-align:center;">
    <h1 style="color:#fff;">Official Verification Center</h1>
    <p style="color:var(--color-text-muted);">Beware of imposters. Verify if the person contacting you officially represents Omni Exchange by entering their Telegram handle, email address, or phone number below.</p>
    
    <div style="background:var(--color-bg-deep); border:1px solid var(--color-bg-light); border-radius:12px; padding:40px; margin-top:30px;">
      <input type="text" class="input-box" placeholder="@Telegram, Email, or URL" />
      <button class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">Verify Identity</button>
    </div>
  </main>
  <div id="footer-container"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
