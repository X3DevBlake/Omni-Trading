<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Pay | Secure Checkout</title>
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .checkout-container {
      max-width: 500px;
      margin: 80px auto;
      padding: 40px;
      background: var(--color-bg-glass);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      position: relative;
    }
    .pay-btn {
      width: 100%;
      padding: 18px;
      border-radius: 40px;
      background: var(--color-primary);
      color: #000;
      font-weight: 800;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .pay-btn:hover {
      transform: scale(1.02);
      filter: brightness(1.1);
      box-shadow: 0 10px 40px rgba(0, 210, 166, 0.3);
    }
    .payment-status { display: none; margin-top: 30px; text-align: center; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="container">
    <div class="checkout-container gsap-reveal">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px;">
        <h2 style="margin: 0;">Confirm Order</h2>
        <div style="background: rgba(0, 210, 166, 0.1); color: var(--color-primary); padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; font-weight: 800;">ENCRYPTED</div>
      </div>

      <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; margin-bottom: 30px;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
          <span style="color: var(--color-text-muted);">Selected Tier</span>
          <span id="display-plan" style="font-weight: 700; color: #fff;">BRONZE</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
          <span style="color: var(--color-text-muted);">Hashrate Limit</span>
          <span id="display-hash" style="color: var(--color-primary);">10 MH/s</span>
        </div>
        <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">
        <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
          <span style="font-weight: 700;">Total Due</span>
          <span id="display-price" style="font-weight: 800; color: #fff;">$19.00</span>
        </div>
      </div>

      <button id="pay-button" class="pay-btn">
        <i data-lucide="shield-check" style="vertical-align: middle; margin-right: 8px;"></i> Complete Payment
      </button>

      <!-- Status Indicators -->
       <div id="payment-status" class="payment-status">
          <div id="status-icon" style="font-size: 3rem; margin-bottom: 15px;">🔄</div>
          <h3 id="status-text">Processing Sovereign Node...</h3>
          <p id="status-sub" style="color: var(--color-text-muted);">Syncing with Omni Blockchain...</p>
       </div>
    </div>
  </main>

  <script type="module">
    import { db, auth } from '../services/Auth.js';
    import { haptics } from '../services/HapticService.js';
    import { doc, updateDoc } from 'firebase/firestore';

    document.addEventListener('DOMContentLoaded', () => {
      if (window.lucide) window.lucide.createIcons();

      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan') || 'BRONZE';
      const price = params.get('price') || '19';
      const hash = params.get('hash') || '10';

      document.getElementById('display-plan').innerText = plan;
      document.getElementById('display-price').innerText = `$${price}.00`;
      document.getElementById('display-hash').innerText = `${hash} MH/s`;

      const payBtn = document.getElementById('pay-button');
      const statusBox = document.getElementById('payment-status');

      payBtn.addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) {
            alert("Please login to proceed.");
            return;
        }

        haptics.impact();
        payBtn.style.display = 'none';
        statusBox.style.display = 'block';

        // Simulation Loop
        setTimeout(() => {
          document.getElementById('status-icon').innerText = '🔥';
          document.getElementById('status-text').innerText = 'Provisioning Hashrate...';
        }, 1500);

        setTimeout(async () => {
          try {
            // THE REAL SAAS UPDATE
            const userRef = doc(db, 'users', user.uid);
            await updateDoc(userRef, {
              tier: plan,
              hashrateLimit: parseInt(hash),
              status: 'ACTIVE'
            });

            haptics.success();
            document.getElementById('status-icon').innerText = '✨';
            document.getElementById('status-text').innerText = 'NODE ACTIVATED';
            document.getElementById('status-sub').innerText = 'Your sovereign node is now online. Redirecting...';

            setTimeout(() => {
               location.href = '/pages/cloud-dashboard.html';
            }, 2000);

          } catch (e) {
            console.error("Payment sync error:", e);
            document.getElementById('status-text').innerText = 'SYNC ERROR';
          }
        }, 3000);
      });
    });
  </script>
</body>
</html>
