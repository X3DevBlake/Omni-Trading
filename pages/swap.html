<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Swap | Instant Deflationary Exchange</title>
    <link rel="stylesheet" href="/css/global.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .swap-page {
            max-width: 480px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }
        .swap-card {
            background: var(--color-bg-glass);
            border: 1px solid var(--color-bg-light);
            border-radius: var(--border-radius-xl);
            padding: 30px;
            backdrop-filter: blur(40px);
            box-shadow: 0 0 60px rgba(0, 210, 166, 0.1);
        }
        .swap-input-container {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            margin-bottom: 5px;
            transition: border-color 0.3s;
        }
        .swap-input-container:focus-within {
            border-color: var(--color-primary);
        }
        .input-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .swap-input {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.8rem;
            width: 70%;
            outline: none;
            font-family: 'JetBrains Mono', monospace;
        }
        .token-selector {
            background: var(--color-bg-light);
            padding: 8px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .token-selector:hover {
            background: rgba(255,255,255,0.1);
        }
        .swap-divider {
            height: 40px;
            width: 40px;
            background: #1a1d24;
            border: 4px solid var(--color-bg-deep);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -20px auto;
            position: relative;
            z-index: 2;
            cursor: pointer;
            color: var(--color-primary);
            transition: transform 0.3s;
        }
        .swap-divider:hover {
            transform: rotate(180deg);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--color-text-muted);
        }
        .burn-badge {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.75rem;
        }
        .btn-swap {
            background: var(--color-primary);
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: var(--border-radius-lg);
            border: none;
            font-weight: 800;
            font-size: 1.1rem;
            margin-top: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 210, 166, 0.2);
        }
        .btn-swap:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0, 210, 166, 0.3);
        }
        .btn-swap:disabled {
            background: #2d3748;
            color: #718096;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>

    <div class="swap-page">
        <div style="margin-bottom: 20px;">
            <h1 style="color:#fff; margin-bottom:5px;">Omni Swap</h1>
            <p style="color:var(--color-text-muted); font-size:0.9rem;">High-performance deflationary exchange.</p>
        </div>

        <div class="swap-card">
            <!-- From Section -->
            <div class="swap-input-container">
                <div class="input-header">
                    <span>You Pay</span>
                    <span>Balance: <span id="balance-from">0.00</span></span>
                </div>
                <div class="input-row">
                    <input type="number" id="input-from" class="swap-input" placeholder="0.0" />
                    <div class="token-selector" id="token-from" onclick="toggleTokens('from')">
                        <img id="img-from" src="https://cryptologos.cc/logos/tether-usdt-logo.svg" width="24" height="24" />
                        <span id="symbol-from">USDT</span>
                        <i data-lucide="chevron-down" style="width:16px;"></i>
                    </div>
                </div>
            </div>

            <!-- Arrow -->
            <div class="swap-divider" onclick="flipAssets()">
                <i data-lucide="arrow-down"></i>
            </div>

            <!-- To Section -->
            <div class="swap-input-container" style="margin-top:5px;">
                <div class="input-header">
                    <span>You Receive</span>
                    <span>Balance: <span id="balance-to">0.00</span></span>
                </div>
                <div class="input-row">
                    <input type="number" id="input-to" class="swap-input" placeholder="0.0" readonly />
                    <div class="token-selector" id="token-to" onclick="toggleTokens('to')">
                        <img id="img-to" src="https://upload.wikimedia.org/wikipedia/commons/3/30/OMNI_Logo.png" width="24" height="24" />
                        <span id="symbol-to">OMNI</span>
                        <i data-lucide="chevron-down" style="width:16px;"></i>
                    </div>
                </div>
            </div>

            <div class="info-row">
                <span>Exchange Rate</span>
                <span id="exchange-rate">1 USDT = 0.00 OMNI</span>
            </div>
            
            <div class="info-row">
                <span>Slippage Tolerance</span>
                <span>0.5%</span>
            </div>

            <div class="info-row">
                <span>Network Protocol</span>
                <span class="burn-badge">1.5% DEFLATIONARY BURN</span>
            </div>

            <button class="btn-swap" id="btn-execute" disabled>Enter an amount</button>
        </div>

        <!-- Burn Stats Mini -->
        <div class="swap-card" style="margin-top:20px; padding:15px; border-style:dashed;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <i data-lucide="flame" style="color:#ff6b6b; width:20px;"></i>
                    <span style="font-size:0.85rem; color:#fff;">Impact of this trade</span>
                </div>
                <span id="burn-impact" style="color:#ff6b6b; font-weight:bold; font-size:0.9rem;">0.00 OMNI Burned</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { renderNavbar } from '../components/Navbar.js';
        import { WalletService } from '../services/WalletService.js';
        import { SoundService } from '../services/SoundService.js';
        import { initMarketStream } from '../services/MarketStream.js';

        let currentPrices = {};
        let fromAsset = 'USDT';
        let toAsset = 'OMNI';
        let walletData = null;

        const refreshUI = async () => {
            walletData = await WalletService.getBalance();
            document.getElementById('balance-from').innerText = (walletData.liquid[fromAsset] || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('balance-to').innerText = (walletData.liquid[toAsset] || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
            updateCalculation();
        };

        const updateCalculation = () => {
            const amount = parseFloat(document.getElementById('input-from').value) || 0;
            const fromPrice = fromAsset === 'USD' || fromAsset === 'USDT' ? 1 : currentPrices[fromAsset + 'USDT'] || 1;
            const toPrice = toAsset === 'OMNI' ? currentPrices['OMNIUSDT'] : toAsset === 'USD' ? 1 : currentPrices[toAsset + 'USDT'] || 1;
            
            const rate = fromPrice / toPrice;
            document.getElementById('exchange-rate').innerText = `1 ${fromAsset} = ${rate.toFixed(6)} ${toAsset}`;
            
            const rawReceive = amount * rate;
            const burnAmount = toAsset === 'OMNI' || fromAsset === 'OMNI' ? rawReceive * 0.015 : 0;
            const finalReceive = rawReceive - burnAmount;
            
            document.getElementById('input-to').value = finalReceive > 0 ? finalReceive.toFixed(6) : "";
            document.getElementById('burn-impact').innerText = `${burnAmount.toFixed(4)} OMNI Burned`;
            
            const btn = document.getElementById('btn-execute');
            if (amount <= 0) {
                btn.disabled = true;
                btn.innerText = "Enter an amount";
            } else if (amount > (walletData?.liquid[fromAsset] || 0)) {
                btn.disabled = true;
                btn.innerText = `Insufficient ${fromAsset} Balance`;
            } else {
                btn.disabled = false;
                btn.innerText = "Swap Assets";
            }
        };

        window.flipAssets = () => {
            [fromAsset, toAsset] = [toAsset, fromAsset];
            
            const imgF = document.getElementById('img-from');
            const imgT = document.getElementById('img-to');
            const symF = document.getElementById('symbol-from');
            const symT = document.getElementById('symbol-to');
            
            const tempImg = imgF.src;
            imgF.src = imgT.src;
            imgT.src = tempImg;
            
            const tempSym = symF.innerText;
            symF.innerText = symT.innerText;
            symT.innerText = tempSym;
            
            refreshUI();
        };

        document.getElementById('input-from').oninput = updateCalculation;

        document.getElementById('btn-execute').onclick = async () => {
            const btn = document.getElementById('btn-execute');
            const fromAmt = parseFloat(document.getElementById('input-from').value);
            btn.innerText = "Executing Protocol...";
            btn.disabled = true;
            
            // Logic: Sell FromAsset for USD, then Buy ToAsset with USD
            // This ensures the 1.5% burn in WalletService is triggered twice (once for sell, once for buy) 
            // producing a total effective burn of ~3% or 1.5% depending on implementation
            
            const rateFrom = fromAsset === 'USDT' ? 1 : currentPrices[fromAsset + 'USDT'];
            const rateTo = toAsset === 'USDT' ? 1 : currentPrices[toAsset + 'USDT'];

            const sellRes = await WalletService.executeSell(fromAsset, fromAmt, rateFrom);
            if(sellRes.success) {
                const buyRes = await WalletService.executeBuy(toAsset, sellRes.usdGained, rateTo);
                if(buyRes.success) {
                    SoundService.play('zip');
                    alert(`Swap Successful! Burnt 1.5% OMNI for platform stability.`);
                    document.getElementById('input-from').value = "";
                }
            } else {
                alert("Error: " + sellRes.msg);
            }
            
            refreshUI();
        };

        // Listen for price updates 1s
        window.addEventListener('omni_price_update', (e) => {
            currentPrices = e.detail;
            updateCalculation();
        });

        renderNavbar();
        initMarketStream();
        refreshUI();
        lucide.createIcons();
    </script>
</body>
</html>
