<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMNI MINER TERMINAL v1.0</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
  <link rel="stylesheet" href="/css/global.css">
  <style>
    body { background: #000; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    #terminal-container { flex: 1; padding: 10px; position: relative; }
    
    /* CRT Effects */
    .crt::before {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 118, 0.06));
      z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none;
    }
    .crt::after {
      content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
      background: rgba(18, 16, 16, 0.1); opacity: 0; z-index: 2; pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.27861; }
      10% { opacity: 0.13576; }
      20% { opacity: 0.18128; }
      30% { opacity: 0.29391; }
      40% { opacity: 0.11987; }
      50% { opacity: 0.32623; }
      60% { opacity: 0.12564; }
      70% { opacity: 0.16541; }
      80% { opacity: 0.24521; }
      90% { opacity: 0.13313; }
      100% { opacity: 0.23191; }
    }

    .xterm-viewport { overflow-y: hidden !important; }
    
    .header-bar {
      background: #00D2A6; color: #000; padding: 4px 15px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
      display: flex; justify-content: space-between; font-weight: 800;
    }
  </style>
</head>
<body class="crt">
  <div class="header-bar">
    <span>OMNI-OS v1.0.4 - SOVEREIGN MINER</span>
    <span id="system-time">SYNCING...</span>
  </div>
  
  <div id="terminal-container"></div>

  <!-- Terminal Logic -->
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>
  
  <script type="module">
    import { haptics } from '../services/HapticService.js';
    import { startMiningTicker, fmtOMNI, omniPerSecond } from '../js/cloud-mining-engine.js';
    
    // Initialize Xterm
    const term = new Terminal({
      cursorBlink: true,
      theme: { background: '#000', foreground: '#00D2A6', cursor: '#00D2A6' },
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 14,
      scrollback: 1000,
      convertEol: true
    });
    
    const fitAddon = new window.FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();

    // Welcome Message
    term.writeln('\x1b[1;36mInitializing OMNI Sovereign Miner Terminal...\x1b[0m');
    term.writeln('------------------------------------------------');
    term.writeln('Network: Omni-Mainnet-8888');
    term.writeln('Status:  \x1b[1;32mCONNECTED\x1b[0m');
    term.writeln('------------------------------------------------');
    term.writeln('Type "help" to see available commands.');
    term.write('\r\nomni-miner@sovereign:~$ ');

    let command = '';
    let isMining = false;
    let worker = null;

    term.onKey(e => {
      const char = e.key;
      if (e.domEvent.keyCode === 13) { // Enter
        haptics.lightTap();
        processCommand(command);
        command = '';
      } else if (e.domEvent.keyCode === 8) { // Backspace
        if (command.length > 0) {
          command = command.slice(0, -1);
          term.write('\b \b');
        }
      } else {
        command += char;
        term.write(char);
      }
    });

    const user = auth.currentUser;

    function processCommand(cmd) {
      term.writeln('');
      const line = cmd.trim().toLowerCase();
      const currentUser = auth.currentUser;
      
      if (line === 'help') {
        term.writeln('OMNI CLI - SaaS Mining Hub');
        term.writeln('  auth --status : View login and subscription state');
        term.writeln('  mine --start  : Start PoW (Requires SILVER+ tier)');
        term.writeln('  mine --stop   : Shutdown local mining');
        term.writeln('  upgrade       : View premium mining tiers');
        term.writeln('  exit          : Return to hub');
      } 
      else if (line === 'auth --status') {
         if (!currentUser) {
            term.writeln('\x1b[1;31m[!] STATUS: NOT LOGGED IN\x1b[0m');
            term.writeln('Please login via the main portal.');
         } else {
            term.writeln('\x1b[1;32m[+] LOGGED IN AS: ' + currentUser.email + '\x1b[0m');
            term.writeln('[+] NODE ID: ' + currentUser.uid.substring(0,8));
         }
      }
      else if (line === 'mine --start') {
        if (!currentUser) {
            term.writeln('\x1b[1;31m[!] ACCESS DENIED: Authentication Required.\x1b[0m');
            return;
        }
        
        // Mocking Tier-Check for demo (In production, we fetch getUserProfile)
        term.writeln('\x1b[1;36m[SYSTEM] Verifying Subscription Tier...\x1b[0m');
        
        setTimeout(() => {
          if (isMining) {
             term.writeln('\x1b[1;33m[!] Error: Cycle in progress.\x1b[0m');
          } else {
             isMining = true;
             haptics.impact();
             term.writeln('\x1b[1;32m[SYSTEM] TIER VERIFIED: SOVEREIGN\x1b[0m');
             term.writeln('\x1b[1;32m[SYSTEM] Initializing Hashing Core...\x1b[0m');
             
             worker = new Worker('../services/mining-worker.js');
             worker.postMessage({ action: 'start', difficulty: 5 });
             
             worker.onmessage = (msg) => {
               if (msg.data.type === 'status') {
                 if (msg.data.nonce % 100000 === 0) {
                    term.writeln(`\x1b[0;90m[STREAK] Computing @ ${msg.data.hashrate} H/s\x1b[0m`);
                 }
               } else if (msg.data.type === 'block_found') {
                 haptics.success();
                 term.writeln('\x1b[1;32m[★ SUCCESS] BLOCK FOUND! Shares being synced to Cloud...\x1b[0m');
                 // Sync block reward to cloud
                 import('../js/cloud-mining-engine.js').then(({ syncToFirestore }) => syncToFirestore(50));
               }
             };
          }
          term.write('\r\nomni-miner@sovereign:~$ ');
        }, 800);
        return;
      }
      else if (line === 'upgrade') {
        term.writeln('\x1b[1;36m>> Opening Plan Hub...\x1b[0m');
        setTimeout(() => location.href = '/pages/mining-plans.html', 500);
      }
      else if (line === 'exit') {
        location.href = '/';
      }
      else {
        term.writeln(`\x1b[1;31mUnknown: ${line}\x1b[0m`);
      }
      
      term.write('\r\nomni-miner@sovereign:~$ ');
    }

    // Live Ticker integration
    setInterval(() => {
        document.getElementById('system-time').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.addEventListener('resize', () => fitAddon.fit());
  </script>
</body>
</html>
