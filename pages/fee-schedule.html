<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fee Schedule | Omni</title>
  <link rel="stylesheet" href="/css/global.css">
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px;}
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--color-bg-light); }
    th { color: var(--color-text-muted); font-weight: normal; }
    td { color: #fff; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>
  <main class="container" style="min-height: 80vh; max-width:800px; padding: 60px 0;">
    <h1 style="color:#fff;">Omni Global Fee Schedule</h1>
    <p style="color:var(--color-text-muted);">Trade with the industry's most competitive rates.</p>
    
    <h3 style="color:#fff; margin-top:40px;">Futures VIP Tiers (USDT-M)</h3>
    <div style="background:var(--color-bg-glass); border:1px solid var(--color-bg-light); border-radius:8px; padding:20px;">
      <table>
        <tr><th>Tier</th><th>Maker Fee</th><th>Taker Fee</th><th>30-Day Vol (USDT)</th></tr>
        <tr><td>VIP 0 (Default)</td><td>0.0200%</td><td>0.0600%</td><td>&lt; 5 Million</td></tr>
        <tr><td>VIP 1</td><td>0.0150%</td><td>0.0450%</td><td>&gt; 5 Million</td></tr>
        <tr><td>VIP 2</td><td>0.0100%</td><td>0.0350%</td><td>&gt; 50 Million</td></tr>
        <tr><td>VIP 3</td><td>-0.0050%</td><td>0.0250%</td><td>&gt; 500 Million</td></tr>
      </table>
    </div>
  </main>
  <div id="footer-container"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
