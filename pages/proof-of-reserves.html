<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proof of Reserves | Omni</title>
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>
  <div id="navbar-container"></div>
  <main class="container" style="min-height: 80vh; max-width:800px; padding: 60px 0; text-align:center;">
    <h1 style="color:#fff;">100% Proof of Reserves</h1>
    <p style="color:var(--color-text-muted);">Omni holds all user assets 1:1, verifiable dynamically on the blockchain via Merkle Tree calculations.</p>
    
    <div style="background:var(--color-bg-deep); border:1px solid var(--color-bg-light); border-radius:12px; padding:40px; margin-top:30px; text-align:left;">
       <h3 style="color:#fff;">Current Reserve Ratio: <span style="color:var(--color-success)">103.4%</span></h3>
       <p style="color:var(--color-text-muted);">Last Snapshot: April 1, 2026</p>
       
       <div style="margin-top:30px; display:flex; justify-content:space-between; border-bottom:1px solid var(--color-bg-light); padding-bottom:10px;">
         <span style="color:var(--color-text-muted);">Asset</span>
         <span style="color:#fff;">Reserve Ratio</span>
       </div>
       <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--color-bg-light);">
         <span style="color:var(--color-primary); font-weight:bold;">BTC</span>
         <span style="color:var(--color-success);">101.8%</span>
       </div>
       <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid var(--color-bg-light);">
         <span style="color:var(--color-primary); font-weight:bold;">ETH</span>
         <span style="color:var(--color-success);">104.2%</span>
       </div>
       <div style="display:flex; justify-content:space-between; padding:15px 0;">
         <span style="color:var(--color-primary); font-weight:bold;">USDT</span>
         <span style="color:var(--color-success);">105.1%</span>
       </div>
       
       <button class="btn btn-primary" style="margin-top:20px;">Download Merkle Tree Report</button>
    </div>
  </main>
  <div id="footer-container"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
