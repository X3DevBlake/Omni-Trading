<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omni Cloud Mining | Sovereign Node Overview</title>
  <link rel="stylesheet" href="/css/global.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background: #000; }
    .stat-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      transition: all 0.3s ease;
    }
    .stat-card:hover {
      background: rgba(0, 210, 166, 0.05);
      border-color: var(--color-primary);
    }
    .hashrate-glitch {
      font-size: 3rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--color-primary);
      text-shadow: 0 0 20px rgba(0, 210, 166, 0.4);
    }
    .node-map-sim {
      height: 200px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/e/ec/World_map_blank_without_borders.svg') no-repeat center;
      background-size: contain;
      filter: invert(1) opacity(0.1);
      position: relative;
    }
    .node-dot {
      position: absolute;
      width: 6px; height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--color-primary);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main id="app" class="container" style="padding: 100px 20px;">
    
    <!-- Hero Header -->
    <header style="text-align: center; margin-bottom: 60px;">
      <h1 class="gsap-reveal" style="font-size: 3rem; margin-bottom: 10px;">Omni Cloud Node</h1>
      <p class="gsap-reveal" style="color: var(--color-text-muted);">Real-time simulation of your sovereign cloud hashrate and rewards.</p>
    </header>

    <!-- Main Stats Grid -->
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
      
      <div class="stat-card gsap-reveal">
        <div style="color: var(--color-primary); margin-bottom: 15px;"><i data-lucide="zap"></i> Active Hashrate</div>
        <div id="live-hashrate" class="hashrate-glitch">0.00</div>
        <div style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 5px;">MH/s (SOVEREIGN TIER)</div>
      </div>

      <div class="stat-card gsap-reveal">
        <div style="color: var(--color-primary); margin-bottom: 15px;"><i data-lucide="database"></i> Cloud Balance</div>
        <div id="live-balance" style="font-size: 2.2rem; font-weight: 800;">0.000000</div>
        <div style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 5px;">OMNI (SYNCED)</div>
      </div>

      <div class="stat-card gsap-reveal">
        <div style="color: var(--color-primary); margin-bottom: 15px;"><i data-lucide="network"></i> Network Health</div>
        <div style="font-size: 1.5rem; font-weight: 700;">STABLE</div>
        <div style="font-size: 0.8rem; color: var(--color-text-muted); margin-top: 5px;">LATENCY: 14ms</div>
      </div>

    </div>

    <!-- Node Visualization -->
    <div class="glass-panel gsap-reveal" style="margin-top: 40px; padding: 40px;">
      <h3 style="margin-bottom: 20px;"><i data-lucide="globe" style="vertical-align: middle; margin-right: 10px;"></i> Global Mining Cluster</h3>
      <div class="node-map-sim">
        <div class="node-dot" style="top: 30%; left: 20%;"></div>
        <div class="node-dot" style="top: 45%; left: 75%;"></div>
        <div class="node-dot" style="top: 60%; left: 45%;"></div>
        <div class="node-dot" style="top: 25%; left: 85%;"></div>
      </div>
    </div>

    <!-- Action Bar -->
    <div style="margin-top: 40px; display: flex; gap: 20px; justify-content: center;">
      <a href="/pages/mining-plans.html" class="btn btn-primary magnetic-btn" style="border-radius: 30px; padding: 16px 40px;">
        <i data-lucide="trending-up"></i> Upgrade Node
      </a>
      <button onclick="location.href='/pages/miner-terminal.html'" class="btn btn-outline" style="border-radius: 30px;">
        <i data-lucide="terminal"></i> Launch Terminal
      </button>
    </div>

  </main>

  <div id="footer-container"></div>
  <script type="module" src="/js/main.js"></script>
  
  <script type="module">
    import { startMiningTicker, fmtOMNI } from '../js/cloud-mining-engine.js';
    import { fetchMiningState } from '../js/cloud-mining-engine.js';
    import { auth } from '../services/Auth.js';

    document.addEventListener('DOMContentLoaded', async () => {
      if (window.lucide) window.lucide.createIcons();

      // Hook up the live ticker for visual updates
      startMiningTicker((snap) => {
        const hashEl = document.getElementById('live-hashrate');
        if (hashEl) {
            // Add a little flicker for the 'hacker' vibe
            hashEl.innerText = (snap.perSec * 1000000).toFixed(2);
        }
      });

      // Periodic high-fidelity balance fetch from Cloud
      setInterval(async () => {
        const state = await fetchMiningState();
        if (state) {
            document.getElementById('live-balance').innerText = state.cloudBalance.toFixed(6);
        }
      }, 10000);
    });
  </script>
</body>
</html>
