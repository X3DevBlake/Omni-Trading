<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers | Omni</title>
  <link rel="stylesheet" href="/css/global.css">
</head>
<body>
  <div id="navbar-container"></div>
  
  <main class="container" style="min-height: 80vh; padding-top: 60px;">
    <div style="text-align:center; padding-bottom:40px;">
      <h1 style="font-size:3rem; color:#fff;">Join the Omni Team</h1>
      <p style="color:var(--color-text-muted); font-size:1.1rem;">Build the borderless future of finance with us.</p>
    </div>

    <div style="max-width:800px; margin:0 auto; background:var(--color-bg-glass); border:1px solid var(--color-bg-light); border-radius:var(--border-radius-lg); padding:40px; text-align:center;">
       <h2 style="color:#fff; margin-bottom:20px;">Open Positions</h2>
       <p style="color:var(--color-text-muted); margin-bottom:30px;">We are currently actively hiring for our global, fully-remote engineering teams.</p>
       
       <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--color-bg-light); padding:20px 0; text-align:left;">
         <div>
           <h3 style="color:#fff; margin:0;">Senior WebGL/Three.js Engineer</h3>
           <span style="color:var(--color-primary); font-size:0.9rem;">Engineering - Remote</span>
         </div>
         <button class="btn btn-outline" style="border-color:var(--color-primary); color:var(--color-primary);">Apply Now</button>
       </div>
       <div style="display:flex; justify-content:space-between; align-items:center;  padding:20px 0; text-align:left;">
         <div>
           <h3 style="color:#fff; margin:0;">Quantitative Rust Developer (Matching Engine)</h3>
           <span style="color:var(--color-primary); font-size:0.9rem;">Engineering - Remote</span>
         </div>
         <button class="btn btn-outline" style="border-color:var(--color-primary); color:var(--color-primary);">Apply Now</button>
       </div>
    </div>
  </main>

  <div id="footer-container"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
